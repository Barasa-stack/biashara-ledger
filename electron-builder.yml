appId: com.biasharaledger.app
productName: BiasharaLedger
directories:
  output: dist-electron

npmRebuild: false
nodeGypRebuild: false

files:
  - electron/**/*
  - package.json

asar: true

icon: electron/assets/icon.png

mac:
  target:
    - target: dmg
      arch:
        - x64
  category: public.app-category.finance

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: BiasharaLedger
  runAfterFinish: true
