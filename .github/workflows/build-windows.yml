name: Build Windows Desktop Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npx next build --webpack

      - name: Build Electron Windows Installer
        run: npx electron-builder build --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: BiasharaLedger-Windows-x64
          path: dist-electron/*.exe

      - name: Upload latest.yml for auto-update
        uses: actions/upload-artifact@v4
        with:
          name: latest.yml
          path: dist-electron/latest.yml

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.exe
            dist-electron/latest.yml
          generate_release_notes: true
